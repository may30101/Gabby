<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>租金扣繳計算機</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Noto Sans TC', sans-serif; background: #fff; color: #222; max-width: 480px; margin: 0 auto; padding-bottom: 60px; }
.tab-bar { display: flex; border-bottom: 2px solid #f0f0f0; }
.tab { flex: 1; text-align: center; padding: 14px 0; font-size: 15px; font-weight: 500; color: #aaa; cursor: pointer; border-bottom: 3px solid transparent; margin-bottom: -2px; }
.tab.active { color: #e8622a; border-bottom-color: #e8622a; font-weight: 700; }
.title { text-align: center; padding: 24px 20px 16px; }
.title h1 { font-size: 24px; font-weight: 900; display: flex; align-items: center; justify-content: center; gap: 8px; }
.deco { color: #e8622a; font-size: 20px; }
.form { padding: 8px 20px; }
.field-row { display: flex; align-items: center; margin-bottom: 18px; gap: 12px; }
.field-label { font-size: 17px; font-weight: 700; min-width: 72px; flex-shrink: 0; }
.field-input { flex: 1; position: relative; }
select { width: 100%; font-family: 'Noto Sans TC', sans-serif; font-size: 16px; font-weight: 500; color: #e8622a; background: #fff; border: 2px solid #e8622a; border-radius: 10px; padding: 12px 36px 12px 16px; outline: none; appearance: none; -webkit-appearance: none; cursor: pointer; }
.select-arrow { position: absolute; right: 14px; top: 50%; transform: translateY(-50%); color: #e8622a; pointer-events: none; font-size: 14px; }
input[type=number] { width: 100%; font-family: 'Noto Sans TC', sans-serif; color: #222; background: #fff; border: 2px solid #e8622a; border-radius: 10px; padding: 12px 16px; outline: none; text-align: right; font-size: 20px; }
input[type=number]::placeholder { color: #bbb; }
.adv-toggle { text-align: right; margin-bottom: 12px; margin-top: -8px; }
.adv-btn { background: none; border: none; color: #e8622a; font-size: 14px; font-family: 'Noto Sans TC', sans-serif; cursor: pointer; padding: 0; }
.adv-panel { display: none; background: #fff8f5; border: 1px solid #f5d0c0; border-radius: 10px; padding: 14px; margin-bottom: 14px; }
.adv-panel.open { display: block; }
.radio-row { display: flex; gap: 24px; margin-bottom: 20px; padding-left: 84px; }
.radio-label { display: flex; align-items: center; gap: 8px; font-size: 14px; cursor: pointer; }
.radio-label input[type=radio] { display: none; }
.radio-dot { width: 18px; height: 18px; border-radius: 50%; border: 2px solid #ccc; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.radio-dot.checked { border-color: #e8622a; }
.radio-dot.checked::after { content: ''; display: block; width: 8px; height: 8px; border-radius: 50%; background: #e8622a; }
.divider { border: none; border-top: 2px dashed #e8622a; margin: 8px 20px 20px; opacity: .4; }
.result { padding: 0 20px; }
.person-title { font-size: 16px; font-weight: 700; color: #e8622a; margin-bottom: 12px; }
.result-row { display: flex; justify-content: space-between; align-items: center; padding: 7px 0; font-size: 15px; }
.lbl { color: #333; display: flex; align-items: center; gap: 6px; }
.lbl-star { font-size: 13px; }
.amt { font-weight: 700; color: #e8622a; }
.result-note { font-size: 13px; color: #e8622a; margin-top: 12px; display: flex; align-items: flex-start; gap: 4px; }
.info-icon { display: inline-flex; align-items: center; justify-content: center; width: 16px; height: 16px; border-radius: 50%; border: 1.5px solid #aaa; color: #aaa; font-size: 10px; font-style: italic; font-weight: 700; flex-shrink: 0; }
</style>
</head>
<body>

<div class="tab-bar">
  <div class="tab active">租金</div>
  <div class="tab">執行業務所得</div>
</div>

<div class="title">
  <h1><span class="deco">\ </span>租金扣繳計算機<span class="deco"> /</span></h1>
</div>

<div class="form">

  <div class="field-row">
    <div class="field-label">房東</div>
    <div class="field-input">
      <select id="landlord" onchange="calc()">
        <option value="individual_local">個人</option>
        <option value="individual_foreign">個人（外國人）</option>
        <option value="company">公司</option>
      </select>
      <span class="select-arrow">⇅</span>
    </div>
  </div>

  <div class="adv-toggle">
    <button class="adv-btn" id="adv-btn" onclick="toggleAdv()">進階設定 ▼</button>
  </div>

  <div class="adv-panel" id="adv-panel">
    <div class="field-row">
      <div class="field-label" style="font-size:14px">扣繳稅率</div>
      <div class="field-input">
        <select id="custom-rate" onchange="calc()">
          <option value="0.1">10%（本國人）</option>
          <option value="0.2">20%（外國人）</option>
          <option value="0">0%（免扣繳）</option>
        </select>
        <span class="select-arrow">⇅</span>
      </div>
    </div>
  </div>

  <div class="field-row">
    <div class="field-label">每期租金</div>
    <div class="field-input">
      <input type="number" id="rent" placeholder="0" min="0" oninput="calc()">
    </div>
  </div>

  <div class="radio-row">
    <label class="radio-label" onclick="setMode('included')">
      <span class="radio-dot checked" id="dot-included"></span>租金已含稅
    </label>
    <label class="radio-label" onclick="setMode('excluded')">
      <span class="radio-dot" id="dot-excluded"></span>租金未含稅
    </label>
  </div>

</div>

<hr class="divider">

<div class="result">
  <div class="person-title" id="person-title">房東 1：本國人</div>

  <div class="result-row">
    <span class="lbl"><span class="lbl-star">＊</span> 每期租金（含稅）</span>
    <span class="amt" id="r-gross">$0</span>
  </div>
  <div class="result-row">
    <span class="lbl"><span class="lbl-star">＊</span> 扣繳 <span id="r-rate-label">10%</span> <span class="info-icon">i</span></span>
    <span class="amt" id="r-tax">$0</span>
  </div>
  <div class="result-row" id="r-nhi-row">
    <span class="lbl"><span class="lbl-star">＊</span> 二代健保 2.11%</span>
    <span class="amt" id="r-nhi">$0</span>
  </div>
  <div class="result-row">
    <span class="lbl"><span class="lbl-star">＊</span> 租扣二代總金額</span>
    <span class="amt" id="r-total">$0</span>
  </div>
  <div class="result-row">
    <span class="lbl"><span class="lbl-star">＊</span> 實際支付租金（未稅）</span>
    <span class="amt" id="r-net">$0</span>
  </div>

  <div class="result-note" id="r-note">＊ 本國人應於次月 10 日前繳納繳款書</div>
</div>

<script>
var currentMode = 'included';

function setMode(mode) {
  currentMode = mode;
  document.getElementById('dot-included').className = 'radio-dot' + (mode === 'included' ? ' checked' : '');
  document.getElementById('dot-excluded').className = 'radio-dot' + (mode === 'excluded' ? ' checked' : '');
  calc();
}

function toggleAdv() {
  var p = document.getElementById('adv-panel');
  var open = p.classList.toggle('open');
  document.getElementById('adv-btn').textContent = open ? '進階設定 ▲' : '進階設定 ▼';
  calc();
}

function fmt(n) {
  return '$' + Math.round(n).toLocaleString('zh-TW');
}

function calc() {
  var input = parseFloat(document.getElementById('rent').value) || 0;
  var landlord = document.getElementById('landlord').value;
  var advOpen = document.getElementById('adv-panel').classList.contains('open');
  var rate = advOpen ? parseFloat(document.getElementById('custom-rate').value) : (landlord === 'individual_foreign' ? 0.2 : 0.1);

  var base = currentMode === 'included' ? input / (1 + rate) : input;
  var gross = currentMode === 'included' ? input : input * (1 + rate);
  var tax = base * rate;
  var nhiApply = landlord === 'individual_local' && base > 20000;
  var nhi = nhiApply ? base * 0.0211 : 0;
  var total = tax + nhi;
  var net = base - nhi;

  var titles = { individual_local: '本國人', individual_foreign: '外國人', company: '公司' };
  document.getElementById('person-title').textContent = '房東 1：' + titles[landlord];
  document.getElementById('r-rate-label').textContent = (rate * 100).toFixed(0) + '%';
  document.getElementById('r-gross').textContent = fmt(gross);
  document.getElementById('r-tax').textContent = fmt(tax);
  document.getElementById('r-nhi').textContent = fmt(nhi);
  document.getElementById('r-nhi-row').style.opacity = nhiApply ? '1' : '0.4';
  document.getElementById('r-total').textContent = fmt(total);
  document.getElementById('r-net').textContent = fmt(net);

  var note = document.getElementById('r-note');
  if (landlord === 'individual_local') {
    note.textContent = '＊ 本國人應於次月 10 日前繳納繳款書';
    note.style.display = 'flex';
  } else if (landlord === 'individual_foreign') {
    note.textContent = '＊ 非居住者應於給付時扣繳並於 10 日內繳納';
    note.style.display = 'flex';
  } else {
    note.style.display = 'none';
  }
}

calc();
</script>
</body>
</html>
